name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # forge/camel are public, but the Go proxy may not have re-indexed them
      # yet and falls back to direct git, which 401s anonymously on the runner.
      # Authenticate git with the built-in GITHUB_TOKEN (no setup, reads public
      # repos) so the direct fetch always works.
      - name: Configure git auth for go modules
        run: git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
      # main.go embeds public/build (a Vite build artifact, gitignored). The Go
      # build/test only needs the directory to exist with a file; a stub
      # manifest satisfies the //go:embed at compile time.
      - name: Stub embedded frontend assets
        run: mkdir -p public/build && echo '{}' > public/build/manifest.json
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go test ./...

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: postgres
      DB_SSLMODE: disable
    steps:
      - uses: actions/checkout@v4
      - name: Configure git auth for go modules
        run: git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # The harness builds each throwaway database from the Camel baseline,
      # so only an empty Postgres with CREATE DATABASE privilege is required.
      - run: go test -tags integration ./app/ -run Integration -count=1 -v
