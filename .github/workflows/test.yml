name: tests

on:
  push:
    branches: [main]
  pull_request:

# forge and camel are private github.com/martin3zra modules; GOPRIVATE skips the
# public proxy/checksum DB and the git config below provides credentials to
# clone them. Add a repo secret GO_MODULES_PAT (a token with read access to the
# martin3zra/forge and martin3zra/camel repositories).
env:
  GOPRIVATE: github.com/martin3zra/*

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate private Go modules
        run: git config --global url."https://x-access-token:${{ secrets.GO_MODULES_PAT }}@github.com/".insteadOf "https://github.com/"
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go test ./...

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: postgres
      DB_SSLMODE: disable
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate private Go modules
        run: git config --global url."https://x-access-token:${{ secrets.GO_MODULES_PAT }}@github.com/".insteadOf "https://github.com/"
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # The harness builds each throwaway database from the Camel baseline,
      # so only an empty Postgres with CREATE DATABASE privilege is required.
      - run: go test -tags integration ./app/ -run Integration -count=1 -v
