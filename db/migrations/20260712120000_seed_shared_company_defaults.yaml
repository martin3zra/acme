# Pre-populate company settings on create so a new company can reach the first
# invoice with fewer manual steps.
#
# createCompany already seeds units (copy_shared_data), sequences and redirect
# preferences. This adds three more company-agnostic defaults, copied per company
# through the same copy_shared_data proc, mirroring the shared_units pattern:
#
#   shared_taxes              -> taxes              (ITBIS 18%)
#   shared_warehouses         -> warehouses         (General)
#   shared_expense_categories -> expenses_categories (starter set)
#
# It also adds a `defaults` jsonb column to companies_settings. Go's
# linkCompanyDefaults resolves the seeded tax + warehouse ids after the copy and
# writes {tax_id, warehouse_id} there, so the product form and stock forms can
# pre-select them. NCF is intentionally NOT seeded — its serials are DGII-issued;
# onboarding surfaces it as a checklist item instead.
#
# action: raw for all of it — one ordered statement list so the shared tables
# exist before the function that reads them, and the enum/function DDL has no
# Camel DSL equivalent.
up:
  seed_shared_company_defaults:
    action: raw
    statements:
      - |
        CREATE TABLE public.shared_taxes (
            id bigint GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
            name character varying(255) NOT NULL,
            rate numeric(16,2) NOT NULL DEFAULT 0,
            created_at timestamp without time zone DEFAULT CURRENT_TIMESTAMP,
            updated_at timestamp without time zone DEFAULT CURRENT_TIMESTAMP
        );
      - |
        CREATE TABLE public.shared_warehouses (
            id bigint GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
            name character varying(150) NOT NULL,
            location text,
            created_at timestamp without time zone DEFAULT CURRENT_TIMESTAMP,
            updated_at timestamp without time zone DEFAULT CURRENT_TIMESTAMP
        );
      - |
        CREATE TABLE public.shared_expense_categories (
            id bigint GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
            name character varying(255) NOT NULL,
            description text NOT NULL DEFAULT '',
            created_at timestamp without time zone DEFAULT CURRENT_TIMESTAMP,
            updated_at timestamp without time zone DEFAULT CURRENT_TIMESTAMP
        );
      - |
        INSERT INTO public.shared_taxes (name, rate)
        VALUES ('ITBIS', 18.00);
      - |
        INSERT INTO public.shared_warehouses (name, location)
        VALUES ('General', NULL);
      - |
        INSERT INTO public.shared_expense_categories (name, description) VALUES
            ('Alquiler', 'Renta de local u oficina'),
            ('Servicios', 'Agua, luz, teléfono e internet'),
            ('Nómina', 'Sueldos y compensaciones al personal'),
            ('Suministros de oficina', 'Papelería y materiales de oficina'),
            ('Transporte', 'Combustible, fletes y viáticos'),
            ('Mercadeo', 'Publicidad y promoción'),
            ('Mantenimiento', 'Reparación y mantenimiento de equipos'),
            ('Otros gastos', 'Gastos varios no clasificados');
      - |
        ALTER TABLE ONLY public.companies_settings
            ADD COLUMN defaults jsonb DEFAULT '{}'::jsonb NOT NULL;
      - |
        CREATE OR REPLACE FUNCTION public.copy_shared_data(p_company_id integer) RETURNS void
            LANGUAGE plpgsql
            AS $$
        BEGIN
            INSERT INTO units (company_id, name, base_qty, created_at, updated_at)
            SELECT p_company_id, name, base_qty, NOW(), NOW()
            FROM shared_units;

            INSERT INTO taxes (company_id, name, rate, created_at, updated_at)
            SELECT p_company_id, name, rate, NOW(), NOW()
            FROM shared_taxes;

            INSERT INTO warehouses (company_id, name, location, created_at, updated_at)
            SELECT p_company_id, name, location, NOW(), NOW()
            FROM shared_warehouses;

            INSERT INTO expenses_categories (company_id, name, description, created_at, updated_at)
            SELECT p_company_id, name, description, NOW(), NOW()
            FROM shared_expense_categories;
        END;
        $$;

down:
  seed_shared_company_defaults:
    action: raw
    statements:
      - |
        CREATE OR REPLACE FUNCTION public.copy_shared_data(p_company_id integer) RETURNS void
            LANGUAGE plpgsql
            AS $$
        BEGIN
            INSERT INTO units (company_id, name, base_qty, created_at, updated_at)
            SELECT p_company_id, name, base_qty, NOW(), NOW()
            FROM shared_units;
        END;
        $$;
      - |
        ALTER TABLE ONLY public.companies_settings
            DROP COLUMN IF EXISTS defaults;
      - |
        DROP TABLE IF EXISTS public.shared_expense_categories;
      - |
        DROP TABLE IF EXISTS public.shared_warehouses;
      - |
        DROP TABLE IF EXISTS public.shared_taxes;
