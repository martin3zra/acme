        CREATE FUNCTION public.upsert_tax_receipts(p_company_id integer, p_receipts jsonb) RETURNS void
            LANGUAGE plpgsql
            AS $$
        DECLARE
            r JSONB;
            v_id INT;
            v_start_seq INT;
            v_end_seq INT;
        BEGIN
            FOR r IN SELECT jsonb_array_elements(p_receipts)
            LOOP
                v_id := (r->>'id')::INT;
                v_start_seq := (r->>'start')::INT;
                v_end_seq   := (r->>'end')::INT;
        
                INSERT INTO tax_receipts (
                    company_id,
                    name,
                    serie,
                    type,
                    sequence_start,
                    sequence_end,
                    current,
                    created_at,
                    updated_at,
                    shared_tax_receipt_id
                )
                SELECT
                    p_company_id,
                    s.name,
                    s.serie,
                    s.type,
                    v_start_seq,
                    v_end_seq,
                    v_start_seq,
                    NOW(),
                    NOW(),
                    s.id
                FROM shared_tax_receipts s
                WHERE s.id = v_id
                ON CONFLICT (company_id, id)
                DO UPDATE SET
                    sequence_start = v_start_seq,
                    sequence_end = v_end_seq,
                    updated_at = NOW();
            END LOOP;
        END;
        $$;
      - |
        CREATE FUNCTION public.validate_resource_sequences(p_sequences jsonb) RETURNS boolean
            LANGUAGE plpgsql
            AS $$
        DECLARE
            v record;
        BEGIN
            -- Must be a JSON object
            IF jsonb_typeof(p_sequences) <> 'object' THEN
                RETURN false;
            END IF;
        
            -- Must have at least one variant
            IF NOT EXISTS (
                SELECT 1 FROM jsonb_each(p_sequences)
            ) THEN
                RETURN false;
            END IF;
        
            -- Validate each variant
            FOR v IN
                SELECT key, value
                FROM jsonb_each(p_sequences)
            LOOP
                -- Variant must be an object
                IF jsonb_typeof(v.value) <> 'object' THEN
                    RETURN false;
                END IF;
        
                -- Required fields
                IF NOT (
                    v.value ? 'next'
                    AND v.value ? 'prefix'
                    AND v.value ? 'padding'
                ) THEN
                    RETURN false;
                END IF;
        
                -- Type validation
                IF jsonb_typeof(v.value->'next') <> 'number'
                   OR jsonb_typeof(v.value->'padding') <> 'number'
                   OR jsonb_typeof(v.value->'prefix') <> 'string' THEN
                    RETURN false;
                END IF;
            END LOOP;
        
            RETURN true;
        END;
        $$;
