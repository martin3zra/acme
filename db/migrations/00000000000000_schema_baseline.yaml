        CREATE FUNCTION public.trg_prevent_ap_overpayment() RETURNS trigger
            LANGUAGE plpgsql
            AS $$
        BEGIN
            -- Only check when amount_paid is being increased.
            IF NEW.amount_paid > OLD.amount_paid AND OLD.paid_status = 'paid'::paid_status THEN
                RAISE EXCEPTION
                    'Accounts payable entry % is already fully paid and cannot receive additional payments.',
                    OLD.invoice_number
                    USING ERRCODE = 'check_violation';
            END IF;
            RETURN NEW;
        END;
        $$;
      - |
        CREATE FUNCTION public.trg_prevent_locked_po_delete() RETURNS trigger
            LANGUAGE plpgsql
            AS $$
        BEGIN
            IF OLD.transaction_kind = 'purchase_order'
               AND OLD.paid_status IN ('partial','paid','refunded')
            THEN
                RAISE EXCEPTION
                    'Purchase order % cannot be deleted in status "%".',
                    OLD.code, OLD.paid_status
                    USING ERRCODE = 'check_violation';
            END IF;
            RETURN OLD;
        END;
        $$;
      - |
        CREATE FUNCTION public.trg_prevent_po_header_change() RETURNS trigger
            LANGUAGE plpgsql
            AS $$
        DECLARE
            receipt_count INT;
        BEGIN
            IF NEW.transaction_kind = 'purchase_order' THEN
                IF (OLD.vendor_id IS DISTINCT FROM NEW.vendor_id)
                   OR (OLD.date IS DISTINCT FROM NEW.date)
                THEN
                    SELECT COUNT(*) INTO receipt_count
                      FROM purchases
                     WHERE company_id      = NEW.company_id
                       AND source->>'id'   = NEW.uuid::text
                       AND transaction_kind = 'purchase_receipt'
                       AND deleted_at IS NULL;
        
                    IF receipt_count > 0 THEN
                        RAISE EXCEPTION
                            'Vendor and order date cannot be changed after a receipt has been created for purchase order %.',
                            NEW.code
                            USING ERRCODE = 'check_violation';
                    END IF;
                END IF;
            END IF;
            RETURN NEW;
        END;
        $$;
      - |
        CREATE FUNCTION public.trg_prevent_po_status_reversal() RETURNS trigger
            LANGUAGE plpgsql
            AS $$
        BEGIN
            -- Once a PO reaches 'closed', its purchase_status cannot be changed back.
            IF OLD.transaction_kind = 'purchase_order'
               AND OLD.purchase_status = 'closed'
               AND NEW.purchase_status IS DISTINCT FROM OLD.purchase_status
            THEN
                RAISE EXCEPTION
                    'Purchase order % is closed and its status cannot be changed.',
                    OLD.code
                    USING ERRCODE = 'check_violation';
            END IF;
            RETURN NEW;
        END;
        $$;
