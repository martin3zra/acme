        CREATE TABLE public.accounts_payable (
            id bigint NOT NULL,
            uuid uuid DEFAULT gen_random_uuid() NOT NULL,
            company_id bigint NOT NULL,
            invoice_number character varying(100) NOT NULL,
            vendor_id bigint NOT NULL,
            purchase_id bigint,
            approved_by bigint,
            created_by bigint NOT NULL,
            invoice_date date NOT NULL,
            due_date date NOT NULL,
            paid_at timestamp with time zone,
            amount_total numeric(15,2) NOT NULL,
            tax_amount numeric(15,2) DEFAULT 0.00 NOT NULL,
            discount_amount numeric(15,2) DEFAULT 0.00 NOT NULL,
            amount_payable numeric(15,2) GENERATED ALWAYS AS (((amount_total + tax_amount) - discount_amount)) STORED,
            amount_paid numeric(15,2) DEFAULT 0.00 NOT NULL,
            currency public.currency DEFAULT 'DOP'::public.currency NOT NULL,
            payment_terms public.payment_terms DEFAULT 'net30'::public.payment_terms,
            payment_method public.payment_methods DEFAULT 'ck'::public.payment_methods,
            status public.payable_status DEFAULT 'draft'::public.payable_status NOT NULL,
            notes text,
            created_at timestamp with time zone DEFAULT now() NOT NULL,
            updated_at timestamp with time zone DEFAULT now() NOT NULL,
            balance_due numeric(15,2) GENERATED ALWAYS AS ((((amount_total + tax_amount) - discount_amount) - amount_paid)) STORED,
            partially_paid_at timestamp without time zone,
            overdue_at timestamp with time zone,
            cancellation_reason text,
            payment_reference character varying(100) DEFAULT NULL::character varying,
            paid_status public.paid_status DEFAULT 'unpaid'::public.paid_status NOT NULL,
            CONSTRAINT accounts_payable_amount_paid_check CHECK ((amount_paid >= (0)::numeric)),
            CONSTRAINT accounts_payable_amount_total_check CHECK ((amount_total >= (0)::numeric)),
            CONSTRAINT accounts_payable_discount_amount_check CHECK ((discount_amount >= (0)::numeric)),
            CONSTRAINT accounts_payable_tax_amount_check CHECK ((tax_amount >= (0)::numeric)),
            CONSTRAINT chk_ap_amount_paid_lte_payable CHECK ((amount_paid <= ((amount_total + tax_amount) - discount_amount)))
        );
      - |
        COMMENT ON TABLE public.accounts_payable IS 'Vendor invoices awaiting or having received payment (AP module).';
      - |
        COMMENT ON COLUMN public.accounts_payable.uuid IS 'Public-safe immutable identifier exposed to external systems/APIs.';
      - |
        COMMENT ON COLUMN public.accounts_payable.company_id IS 'Tenant identifier (BIGINT) — references companies(id).';
      - |
        COMMENT ON COLUMN public.accounts_payable.invoice_number IS 'Vendor-issued invoice number, unique within a company.';
      - |
        COMMENT ON COLUMN public.accounts_payable.paid_at IS 'Timestamp of final payment; NULL while invoice is open.';
      - |
        COMMENT ON COLUMN public.accounts_payable.amount_total IS 'Gross invoice amount before tax adjustments.';
      - |
        COMMENT ON COLUMN public.accounts_payable.tax_amount IS 'Tax portion included in or added to the invoice.';
      - |
        COMMENT ON COLUMN public.accounts_payable.discount_amount IS 'Early-payment or negotiated discount to be deducted.';
      - |
        COMMENT ON COLUMN public.accounts_payable.amount_payable IS 'Net amount owed: amount_total + tax_amount - discount_amount (generated).';
      - |
        COMMENT ON COLUMN public.accounts_payable.amount_paid IS 'Running total of payments applied against this invoice.';
      - |
        COMMENT ON COLUMN public.accounts_payable.status IS 'Lifecycle state: DRAFT → PENDING → APPROVED → PARTIAL/PAID, or CANCELLED.';
      - |
        COMMENT ON COLUMN public.accounts_payable.balance_due IS 'Remaining balance owed: amount_payable - amount_paid (generated, always current).';
      - |
        COMMENT ON COLUMN public.accounts_payable.partially_paid_at IS 'Timestamp of first partial payment; NULL while invoice is unpaid.';
      - |
        COMMENT ON COLUMN public.accounts_payable.overdue_at IS 'Timestamp when the invoice crossed its due date unpaid; NULL if still current.';
      - |
        COMMENT ON COLUMN public.accounts_payable.cancellation_reason IS 'Reason for cancellation; populated only when status = CANCELLED.';
      - |
        COMMENT ON COLUMN public.accounts_payable.payment_reference IS 'External payment reference: check number, ACH trace ID, wire ref, etc.';
