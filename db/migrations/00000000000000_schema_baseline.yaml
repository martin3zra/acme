        CREATE FUNCTION public.sync_recurrence_next_run_at() RETURNS trigger
            LANGUAGE plpgsql
            AS $$
        BEGIN
          IF NEW.recurrence ? 'next_run_at' THEN
            NEW.recurrence_next_run_at :=
              (NEW.recurrence->>'next_run_at')::timestamp;
          ELSE
            NEW.recurrence_next_run_at := NULL;
          END IF;
        
          RETURN NEW;
        END;
        $$;
