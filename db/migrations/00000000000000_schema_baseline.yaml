        CREATE FUNCTION public.assert_resource_prerequisites(p_resource text, p_business_id uuid) RETURNS void
            LANGUAGE plpgsql
            AS $$
        DECLARE
            result jsonb;
        BEGIN
            result := check_resource_prerequisites(p_resource, p_business_id);
        
            IF NOT (result->>'ok')::boolean THEN
                RAISE EXCEPTION
                    'Missing prerequisites for %: %',
                    p_resource,
                    result->'missing'
                USING ERRCODE = 'check_violation';
            END IF;
        END;
        $$;
      - |
        CREATE FUNCTION public.check_resource_prerequisites(p_resource text, p_company_id bigint) RETURNS jsonb
            LANGUAGE plpgsql
            AS $_$
        DECLARE
            r record;
            missing jsonb := '[]'::jsonb;
            exists_bool boolean;
        BEGIN
            FOR r IN
                SELECT *
                FROM resource_prerequisites
                WHERE resource = p_resource
                  AND enabled
            LOOP
        
                -- TABLE EXISTS CHECK
                IF r.dependency_type = 'table_exists' THEN
                    EXECUTE format(
                        'SELECT EXISTS (SELECT 1 FROM %I WHERE company_id = $1)',
                        r.target
                    )
                    INTO exists_bool
                    USING p_company_id;
        
                -- JSONB KEY EXISTS CHECK
                ELSIF r.dependency_type = 'jsonb_key_exists' THEN
                    EXECUTE format(
        		        'SELECT (%I -> %L) IS NOT NULL
        		         FROM companies_settings
        		         WHERE company_id = $1',
        		        split_part(r.target, '.', 1),
        		        split_part(r.target, '.', 2)
        		    )
        		    INTO exists_bool
        		    USING p_company_id;
        
        		-- JSONB OBJECT HAS KEYS EXISTS CHECK
        		ELSIF r.dependency_type = 'jsonb_object_has_keys' THEN
        		    EXECUTE format(
        		        'SELECT (%I -> %L) ?& string_to_array(%L, '','')
        		         FROM companies_settings
        		         WHERE company_id = $1',
        		        split_part(split_part(r.target, ':', 1), '.', 1),
        		        split_part(split_part(r.target, ':', 1), '.', 2),
        		        split_part(r.target, ':', 2)
        		    )
        		    INTO exists_bool
        		    USING p_company_id;
        
                -- CUSTOM CHECK (target contains SQL returning boolean)
                ELSIF r.dependency_type = 'custom_check' THEN
                    EXECUTE r.target INTO exists_bool USING p_company_id;
                END IF;
        
                -- Collect missing dependencies
                IF NOT exists_bool THEN
                    missing := missing || jsonb_build_object(
                        'key', r.dependency_key,
                        'message', r.error_message
                    );
                END IF;
        
            END LOOP;
        
            RETURN jsonb_build_object(
                'resource', p_resource,
                'ok', jsonb_array_length(missing) = 0,
                'missing', missing
            );
        END;
        $_$;
