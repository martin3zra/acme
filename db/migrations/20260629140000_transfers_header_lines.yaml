# Reshape transfers into a header + lines document (like invoices/purchases):
# a transfer now carries many variant lines instead of a single variant/qty.
# inventory_transfers keeps the document header (from/to warehouse, status,
# date, notes); per-product detail moves to inventory_transfer_lines.
#
# The table has no data yet, so dropping the single-line columns is safe.
# Dropping variant_id/qty also drops their dependent FK and CHECK constraints.
up:
  transfer_lines:
    action: raw
    statements:
      - "ALTER TABLE public.inventory_transfers DROP COLUMN variant_id;"
      - "ALTER TABLE public.inventory_transfers DROP COLUMN qty;"
      - |
        CREATE TABLE public.inventory_transfer_lines (
            id bigint NOT NULL,
            company_id bigint NOT NULL,
            transfer_id bigint NOT NULL,
            variant_id bigint NOT NULL,
            qty numeric(18,6) NOT NULL,
            unit_id bigint,
            unit_cost numeric(15,2) DEFAULT 0 NOT NULL,
            description text,
            created_at timestamp without time zone DEFAULT CURRENT_TIMESTAMP NOT NULL,
            CONSTRAINT inventory_transfer_lines_qty_check CHECK ((qty > (0)::numeric))
        );
      - |
        CREATE SEQUENCE public.inventory_transfer_lines_id_seq
            START WITH 1
            INCREMENT BY 1
            NO MINVALUE
            NO MAXVALUE
            CACHE 1;
      - |
        ALTER SEQUENCE public.inventory_transfer_lines_id_seq OWNED BY public.inventory_transfer_lines.id;
      - |
        ALTER TABLE ONLY public.inventory_transfer_lines ALTER COLUMN id SET DEFAULT nextval('public.inventory_transfer_lines_id_seq'::regclass);
      - |
        ALTER TABLE ONLY public.inventory_transfer_lines
            ADD CONSTRAINT inventory_transfer_lines_pkey PRIMARY KEY (id);
      - |
        ALTER TABLE ONLY public.inventory_transfer_lines
            ADD CONSTRAINT inventory_transfer_lines_company_id_fkey FOREIGN KEY (company_id) REFERENCES public.companies(id) ON DELETE CASCADE;
      - |
        ALTER TABLE ONLY public.inventory_transfer_lines
            ADD CONSTRAINT inventory_transfer_lines_transfer_id_fkey FOREIGN KEY (transfer_id) REFERENCES public.inventory_transfers(id) ON DELETE CASCADE;
      - |
        ALTER TABLE ONLY public.inventory_transfer_lines
            ADD CONSTRAINT inventory_transfer_lines_variant_id_fkey FOREIGN KEY (variant_id) REFERENCES public.items_variants(id) ON DELETE RESTRICT;
      - |
        ALTER TABLE ONLY public.inventory_transfer_lines
            ADD CONSTRAINT inventory_transfer_lines_unit_id_fkey FOREIGN KEY (unit_id) REFERENCES public.units(id) ON DELETE SET NULL;
      - |
        CREATE INDEX idx_inventory_transfer_lines_transfer ON public.inventory_transfer_lines USING btree (company_id, transfer_id);

down:
  transfer_lines:
    action: raw
    statements:
      - "DROP TABLE IF EXISTS public.inventory_transfer_lines;"
      - "ALTER TABLE public.inventory_transfers ADD COLUMN variant_id bigint;"
      - "ALTER TABLE public.inventory_transfers ADD COLUMN qty numeric(18,6);"
      - |
        ALTER TABLE ONLY public.inventory_transfers
            ADD CONSTRAINT inventory_transfers_variant_id_fkey FOREIGN KEY (variant_id) REFERENCES public.items_variants(id) ON DELETE RESTRICT;
