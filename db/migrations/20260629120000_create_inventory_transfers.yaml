# Manual warehouse-to-warehouse transfer requests with a status lifecycle:
#   requested -> in_transit -> received   (+ cancelled)
# Stock moves OUT of source on dispatch (in_transit) and IN to destination on
# receive (received); both legs are inventory_movements rows that carry
# reference_type='transfer', reference_id=inventory_transfers.id.
#
# action: raw to mirror the schema baseline — the native PG enum type and
# gen_random_uuid default cannot be expressed through Camel's DSL.
up:
  transfer_status_enum:
    action: raw
    statements:
      - |
        CREATE TYPE public.transfer_status AS ENUM (
            'requested',
            'in_transit',
            'received',
            'cancelled'
        );
      - |
        CREATE TABLE public.inventory_transfers (
            id bigint NOT NULL,
            company_id bigint NOT NULL,
            uuid uuid DEFAULT gen_random_uuid() NOT NULL,
            variant_id bigint NOT NULL,
            from_warehouse_id bigint NOT NULL,
            to_warehouse_id bigint NOT NULL,
            qty numeric(18,6) NOT NULL,
            notes text,
            status public.transfer_status DEFAULT 'requested'::public.transfer_status NOT NULL,
            requested_by bigint,
            dispatched_at timestamp without time zone,
            received_at timestamp without time zone,
            created_at timestamp without time zone DEFAULT CURRENT_TIMESTAMP NOT NULL,
            updated_at timestamp without time zone DEFAULT CURRENT_TIMESTAMP NOT NULL,
            CONSTRAINT inventory_transfers_qty_check CHECK ((qty > (0)::numeric)),
            CONSTRAINT inventory_transfers_warehouses_check CHECK ((from_warehouse_id <> to_warehouse_id))
        );
      - |
        CREATE SEQUENCE public.inventory_transfers_id_seq
            START WITH 1
            INCREMENT BY 1
            NO MINVALUE
            NO MAXVALUE
            CACHE 1;
      - |
        ALTER SEQUENCE public.inventory_transfers_id_seq OWNED BY public.inventory_transfers.id;
      - |
        ALTER TABLE ONLY public.inventory_transfers ALTER COLUMN id SET DEFAULT nextval('public.inventory_transfers_id_seq'::regclass);
      - |
        ALTER TABLE ONLY public.inventory_transfers
            ADD CONSTRAINT inventory_transfers_pkey PRIMARY KEY (id);
      - |
        ALTER TABLE ONLY public.inventory_transfers
            ADD CONSTRAINT inventory_transfers_uuid_key UNIQUE (uuid);
      - |
        ALTER TABLE ONLY public.inventory_transfers
            ADD CONSTRAINT inventory_transfers_company_id_fkey FOREIGN KEY (company_id) REFERENCES public.companies(id) ON DELETE CASCADE;
      - |
        ALTER TABLE ONLY public.inventory_transfers
            ADD CONSTRAINT inventory_transfers_variant_id_fkey FOREIGN KEY (variant_id) REFERENCES public.items_variants(id) ON DELETE RESTRICT;
      - |
        ALTER TABLE ONLY public.inventory_transfers
            ADD CONSTRAINT inventory_transfers_from_warehouse_id_fkey FOREIGN KEY (from_warehouse_id) REFERENCES public.warehouses(id) ON DELETE RESTRICT;
      - |
        ALTER TABLE ONLY public.inventory_transfers
            ADD CONSTRAINT inventory_transfers_to_warehouse_id_fkey FOREIGN KEY (to_warehouse_id) REFERENCES public.warehouses(id) ON DELETE RESTRICT;
      - |
        ALTER TABLE ONLY public.inventory_transfers
            ADD CONSTRAINT inventory_transfers_requested_by_fkey FOREIGN KEY (requested_by) REFERENCES public.users(id) ON DELETE SET NULL;
      - |
        CREATE INDEX idx_inventory_transfers_status ON public.inventory_transfers USING btree (company_id, status);
      - |
        CREATE INDEX idx_inventory_transfers_created ON public.inventory_transfers USING btree (company_id, created_at DESC);

down:
  transfer_status_enum:
    action: raw
    statements:
      - "DROP TABLE IF EXISTS public.inventory_transfers;"
      - "DROP TYPE IF EXISTS public.transfer_status;"
